<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
		<title>Blakron Integration Demo</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				background: #111;
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			canvas {
				display: block;
				/* 保持 640:1136 宽高比，高度撑满屏幕，宽度自适应 */
				height: 100vh;
				width: auto;
				aspect-ratio: 640 / 1136;
				/* 如果屏幕比手机宽，两侧留黑边 */
				max-width: 100vw;
			}
		</style>
	</head>
	<body>
		<canvas id="gameCanvas"></canvas>
		<script type="module" src="/src/Main.ts"></script>
	</body>
</html>
